<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Echoes of the Serpent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="game">

  <h1>Echoes of the Serpent</h1>
  <p class="subtitle">Remember what the world reveals.</p>

  <div id="echoes">
    <p id="sequence"></p>

    <input
      type="text"
      id="input"
      placeholder="Repeat the words in order"
      autocomplete="off"
    >

    <button id="submit">Reveal</button>

    <p id="result"></p>
  </div>

  <a class="back-link" href="index.html">Return</a>

  <script src="echoes.js"></script>
</body>
</html>
